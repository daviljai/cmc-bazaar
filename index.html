<!DOCTYPE html>
<html>

<head>

    <title>CMC Bazaar</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            padding:20px;
            background:#0f0f0f;
            color:white;
            font-family:Arial;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .topbar{
            display:flex;
            gap:15px;
            margin-bottom:20px;
            flex-wrap:wrap;
        }

        #search{
            width:250px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1e1e1e;
            color:white;
        }

        #itemSelect{
            width:300px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1e1e1e;
            color:white;
        }

        .layout{
            display:flex;
            gap:20px;
        }

        .left{
            flex:1;
        }

        .sidebar{
            width:320px;
            background:#1a1a1a;
            border-radius:12px;
            padding:15px;
            height:fit-content;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
            margin-bottom:20px;
        }

        .card{
            background:#1e1e1e;
            padding:15px;
            border-radius:10px;
        }

        .chart-box{
            background:#1e1e1e;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
            height:350px;
        }

        h2{
            margin-top:0;
        }

        .orders{
            display:flex;
            gap:10px;
        }

        .orders div{
            flex:1;
        }

        .order{
            background:#222;
            margin-bottom:6px;
            padding:8px;
            border-radius:6px;
            font-size:14px;
        }

        .buy{
            border-left:4px solid lime;
        }

        .sell{
            border-left:4px solid red;
        }

        @media(max-width:1000px){

            .layout{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
            }
        }

    </style>

</head>

<body>

<h1>CMC Bazaar Tracker</h1>

<div class="topbar">

    <input
        type="text"
        id="search"
        placeholder="Search item..."
    >

    <select id="itemSelect"></select>

</div>

<div class="layout">

    <div class="left">

        <div class="stats">

            <div class="card">
                Initial Buy:
                <div id="initialBuy">0</div>
            </div>

            <div class="card">
                Current Buy:
                <div id="currentBuy">0</div>
            </div>

            <div class="card">
                Initial Sell:
                <div id="initialSell">0</div>
            </div>

            <div class="card">
                Current Sell:
                <div id="currentSell">0</div>
            </div>

        </div>

        <div class="chart-box">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="volumeChart"></canvas>
        </div>

    </div>

    <div class="sidebar">

        <h2>Top Orders</h2>

        <div class="orders">

            <div>

                <h3>Buy Orders</h3>

                <div id="buyOrders"></div>

            </div>

            <div>

                <h3>Sell Orders</h3>

                <div id="sellOrders"></div>

            </div>

        </div>

    </div>

</div>

<script>

let priceChart;
let volumeChart;

let allItems = [];

async function loadItems(){

    const response = await fetch("data/all_items.json");

    allItems = await response.json();

    allItems.sort();

    renderDropdown(allItems);

    document.getElementById("search")
        .addEventListener("input", filterItems);

    document.getElementById("itemSelect")
        .addEventListener("change", (e) => {
            loadChart(e.target.value);
        });

    loadChart(allItems[0]);

}

function renderDropdown(items){

    const select = document.getElementById("itemSelect");

    select.innerHTML = "";

    items.forEach(item => {

        const option = document.createElement("option");

        option.value = item;
        option.textContent = item;

        select.appendChild(option);

    });
}

function filterItems(){

    const text = document.getElementById("search")
        .value
        .toLowerCase();

    const filtered = allItems.filter(item =>
        item.toLowerCase().includes(text)
    );

    renderDropdown(filtered);
}

async function loadChart(item){

    const response = await fetch(`data/${item}.json`);

    const raw = await response.json();

    const data = [raw];

    if(!raw.data){

        alert("No data");

        return;
    }

    const labels = data.map(x => {

        const d = new Date(x.time * 1000);

        return d.toLocaleTimeString();

    });

    const buyPrices = data.map(
        x => x.data.buyTopEntries?.[0]?.price || 0
    );

    const sellPrices = data.map(
        x => x.data.sellTopEntries?.[0]?.price || 0
    );

    const buyVolumes = data.map(
        x => x.data.buyVolume || 0
    );

    const sellVolumes = data.map(
        x => x.data.sellVolume || 0
    );

    document.getElementById("initialBuy")
        .innerText = buyPrices[0];

    document.getElementById("currentBuy")
        .innerText = buyPrices[buyPrices.length - 1];

    document.getElementById("initialSell")
        .innerText = sellPrices[0];

    document.getElementById("currentSell")
        .innerText = sellPrices[sellPrices.length - 1];

    if(priceChart){
        priceChart.destroy();
    }

    if(volumeChart){
        volumeChart.destroy();
    }

    priceChart = new Chart(

        document.getElementById("priceChart"),

        {
            type:"line",

            data:{
                labels:labels,

                datasets:[

                    {
                        label:"Buy Price",
                        data:buyPrices,
                        borderColor:"lime"
                    },

                    {
                        label:"Sell Price",
                        data:sellPrices,
                        borderColor:"red"
                    }

                ]
            },

            options:{
                responsive:true,
                maintainAspectRatio:false
            }
        }
    );

    volumeChart = new Chart(

        document.getElementById("volumeChart"),

        {
            type:"line",

            data:{
                labels:labels,

                datasets:[

                    {
                        label:"Buy Volume",
                        data:buyVolumes,
                        borderColor:"cyan"
                    },

                    {
                        label:"Sell Volume",
                        data:sellVolumes,
                        borderColor:"orange"
                    }

                ]
            },

            options:{
                responsive:true,
                maintainAspectRatio:false
            }
        }
    );

    renderOrders(raw.data);

}

function renderOrders(data){

    const buyDiv =
        document.getElementById("buyOrders");

    const sellDiv =
        document.getElementById("sellOrders");

    buyDiv.innerHTML = "";
    sellDiv.innerHTML = "";

    data.buyTopEntries.forEach(order => {

        buyDiv.innerHTML += `
            <div class="order buy">
                Price: ${order.price.toFixed(1)}<br>
                Qty: ${order.quantity}
            </div>
        `;
    });

    data.sellTopEntries.forEach(order => {

        sellDiv.innerHTML += `
            <div class="order sell">
                Price: ${order.price.toFixed(1)}<br>
                Qty: ${order.quantity}
            </div>
        `;
    });
}

loadItems();

</script>

</body>
</html>
